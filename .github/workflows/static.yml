name: Deploy portal-A and portal-B to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build portal-B
        run: |
          cd portal-B
          npm install --legacy-peer-deps
          npm install react@18.3.1 react-dom@18.3.1
          CI=false npx vite build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Assemble deploy directory
        run: |
          mkdir -p _site/portal-A
          mkdir -p _site/portal-B
          cp -r portal-A/. _site/portal-A/
          cp -r portal-B/dist/. _site/portal-B/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
